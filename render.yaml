services:
  - type: web
    name: todo-list-backend
    env: node
    plan: free
    rootDirectory: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: ACCESS_SECRET
        fromSecret: ACCESS_SECRET
      - key: FRONTEND_URL
        value: https://todo-list-n.onrender.com
  - type: static_site
    name: todo-list-frontend
    env: static
    plan: free
    rootDirectory: frontend
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://todo-list-n.onrender.com
